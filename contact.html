    <div class="container">
    <header><h1><b><em>Sign Up</em></b></h1></header>
    <fieldset>
       <legend>Sign up</legend> 
    <form action="">
        <label for="name">First Name: </label> <br>
        <input type="text" placeholder="Enter Your First Name" required id="name" name="name"> <br>
        <label for="name">Last Name: </label> <br>
        <input type="text" placeholder="Enter Your Last Name" required id="name" name="name"> <br>
        <label for="age">Age: </label><br>
        <input type="number" placeholder="Enter Your Age" required id="age" name="age"> <br>
        <label for="gender">Gender</label> <br>
        <input type="radio" id="male" name="gender" required>
        <label for="male">Male</label> <br>
        <input type="radio" id="female" name="gender" required>
        <label for="female">Female</label> <br>
        <label for="num">Phone: </label> <br>
        <input type="tel" placeholder="Enter Your Number" required id="num" name="num"> <br>
        <label for="email">Email: </label> <br>
        <input type="email" id="email" name="email" required placeholder="Enter Your Eamil Address"> <br>
        <label for="pass">Password: </label> <br>
        <input type="password" required name="pass" id="pass" placeholder="Enter Your Password"> <br>
        <label for="pass">Confirm Your Password: </label> <br>
        <input type="password" required id="pass" name="pass" placeholder="Confirm your Password"> <br>
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>
        
    </form>
    </fieldset>
